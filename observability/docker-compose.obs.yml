# ============================================
# Observabilidad Stack — Alentapp Docente
# ============================================
# Prometheus + Grafana para monitoreo de la API.
#
# Uso: docker compose -f observability/docker-compose.obs.yml up -d
# Accesos:
#   Grafana:  http://localhost:3001  (admin / admin)
#   Prometheus: http://localhost:9090
#   Métricas API: http://localhost:3000/metrics

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: alentapp-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - obs-net

  grafana:
    image: grafana/grafana:latest
    container_name: alentapp-grafana
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - obs-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  obs-net:
    driver: bridge
