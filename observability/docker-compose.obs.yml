# ============================================
# Observabilidad Stack Pro — Alentapp Docente
# ============================================
# Stack completo: Prometheus + Alertmanager + Grafana + cAdvisor + node_exporter
#
# Uso: docker compose -f observability/docker-compose.obs.yml up -d
# Accesos:
#   Grafana:     http://localhost:3001  (admin / admin)
#   Prometheus:  http://localhost:9090
#   Alertmanager: http://localhost:9093
#   cAdvisor:    http://localhost:8080
#   Métricas API OTel: http://localhost:9464/metrics

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: alentapp-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - obs-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alentapp-alertmanager
    ports:
      - '9093:9093'
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - obs-net

  grafana:
    image: grafana/grafana:latest
    container_name: alentapp-grafana
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - obs-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: alentapp-cadvisor
    ports:
      - '8080:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    restart: unless-stopped
    networks:
      - obs-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: alentapp-node-exporter
    ports:
      - '9100:9100'
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - obs-net

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  obs-net:
    driver: bridge
