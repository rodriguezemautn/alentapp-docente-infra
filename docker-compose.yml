services:
    db:
        image: postgres:16-alpine
        container_name: alentapp-db
        env_file: .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
            POSTGRES_DB: ${POSTGRES_DB:-alentapp_db}
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-alentapp_db}']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        networks:
            - alentapp-net
        deploy:
            resources:
                limits:
                    memory: 256M
                    cpus: '0.5'

    api:
        build:
            context: .
            dockerfile: packages/api/Dockerfile
        container_name: alentapp-api
        env_file: .env
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://admin:password123@db:5432/alentapp_db}
            CHOKIDAR_USEPOLLING: 'true'
            WATCHPACK_POLLING: 'true'
        volumes:
            - .:/app
            - /app/node_modules
            - /app/packages/api/node_modules
            - /app/packages/shared/node_modules
        ports:
            - '3000:3000'
        command: >
            sh -c "npx prisma generate --config packages/api/prisma.config.ts &&
             npx prisma migrate deploy --config packages/api/prisma.config.ts &&
             npx tsx watch packages/api/src/app.ts"
        depends_on:
            db:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - alentapp-net
        healthcheck:
            test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1']
            interval: 30s
            timeout: 10s
            start_period: 30s
            retries: 3
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'

    web:
        build:
            context: .
            dockerfile: packages/web/Dockerfile
        container_name: alentapp-web
        environment:
            VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
            CHOKIDAR_USEPOLLING: 'true'
            WATCHPACK_POLLING: 'true'
        volumes:
            - .:/app
            - /app/node_modules
            - /app/packages/shared/node_modules
            - /app/packages/web/node_modules
        ports:
            - '5173:5173'
        command: npm run dev -w packages/web -- --host 0.0.0.0
        depends_on:
            - api
        restart: unless-stopped
        networks:
            - alentapp-net
        deploy:
            resources:
                limits:
                    memory: 256M
                    cpus: '0.3'

volumes:
    pgdata:

networks:
    alentapp-net:
        driver: bridge
